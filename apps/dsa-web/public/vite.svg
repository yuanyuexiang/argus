<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="Argus">
  <defs>
    <linearGradient id="argusBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0C3056"/>
      <stop offset="1" stop-color="#04101F"/>
    </linearGradient>
    <linearGradient id="argusCyan" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#0FC4F0"/>
      <stop offset="1" stop-color="#6BF1FF"/>
    </linearGradient>
    <radialGradient id="argusSheen" cx="0.3" cy="0.22" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="argusGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="argusLens"><circle cx="128" cy="128" r="79"/></clipPath>
  </defs>

  <!-- app tile -->
  <rect x="8" y="8" width="240" height="240" rx="54" fill="url(#argusBg)"/>
  <rect x="8" y="8" width="240" height="240" rx="54" fill="url(#argusSheen)"/>
  <rect x="8.75" y="8.75" width="238.5" height="238.5" rx="53.25" fill="none" stroke="#2F6CA8" stroke-opacity="0.45" stroke-width="1.5"/>

  <!-- all-seeing lens -->
  <circle cx="128" cy="128" r="84" fill="none" stroke="url(#argusCyan)" stroke-width="9"/>
  <circle cx="128" cy="128" r="79" fill="#07182E"/>

  <!-- candlesticks: 红涨绿跌 (clipped to the lens) -->
  <g clip-path="url(#argusLens)" stroke-linecap="round">
    <!-- 绿(跌) -->
    <line x1="103" y1="116" x2="103" y2="170" stroke="#06D389" stroke-width="4"/>
    <rect x="95.5" y="132" width="15" height="30" rx="3.5" fill="#06D389"/>
    <!-- 红(涨) -->
    <line x1="131" y1="102" x2="131" y2="178" stroke="#F0494E" stroke-width="4"/>
    <rect x="123.5" y="120" width="15" height="46" rx="3.5" fill="#F0494E"/>
    <!-- 红(涨, 最高) -->
    <line x1="159" y1="90" x2="159" y2="158" stroke="#F0494E" stroke-width="4"/>
    <rect x="151.5" y="103" width="15" height="44" rx="3.5" fill="#F0494E"/>
  </g>

  <!-- uptrend line + spark -->
  <polyline points="95,160 119,138 147,148 171,98" fill="none" stroke="url(#argusCyan)"
            stroke-width="7" stroke-linecap="round" stroke-linejoin="round" filter="url(#argusGlow)"/>
  <circle cx="171" cy="98" r="7.5" fill="#EAFBFF" filter="url(#argusGlow)"/>
</svg>
