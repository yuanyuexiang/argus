# ===================================
# 前后端分离 + 独立 PostgreSQL（opt-in 部署方式）
# ===================================
#
# 拓扑（浏览器只与 web 网关同源通信）：
#
#   浏览器 ──同源──▶ web(Nginx :80)
#                       ├── /     → 托管 SPA 静态
#                       └── /api  → backend(FastAPI :8000)
#                                        │ DATABASE_URL
#                                        ▼
#                                   db(postgres:16, 内部网络)
#
# 与单体 docker-compose.yml 互不影响；本文件是独立的分离部署栈。
#
# 使用方式（在仓库根目录执行）：
#   docker compose -f docker/docker-compose.separated.yml up -d --build
# 仅重建前端：
#   docker compose -f docker/docker-compose.separated.yml up -d --build web
#
# 凭据与端口默认值来自仓库根 .env（POSTGRES_USER/PASSWORD/DB、WEB_PORT），
# 生产环境务必修改默认数据库口令。

name: argus-separated

# 后端 / 定时任务共享的公共配置
x-backend-common: &backend-common
  build:
    context: ..
    dockerfile: docker/Dockerfile
    # 默认走国内镜像（本栈面向国内网络环境）；海外/无墙环境可在 .env 置空覆盖：
    #   APT_MIRROR=    PIP_INDEX_URL=https://pypi.org/simple
    args:
      APT_MIRROR: ${APT_MIRROR-mirrors.tuna.tsinghua.edu.cn}
      PIP_INDEX_URL: ${PIP_INDEX_URL-https://pypi.tuna.tsinghua.edu.cn/simple}
  restart: unless-stopped
  env_file:
    - ../.env
  environment:
    - TZ=Asia/Shanghai
    - WEBUI_HOST=0.0.0.0
    # 指向同栈内的 PostgreSQL 服务；优先于 .env 中的 DATABASE_PATH
    - DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER:-argus}:${POSTGRES_PASSWORD:-argus}@db:5432/${POSTGRES_DB:-argus}
    # 后端位于 Nginx 之后，信任转发头以正确识别协议/客户端 IP
    - TRUST_X_FORWARDED_FOR=true
  volumes:
    - ../data:/app/data
    - ../logs:/app/logs
    - ../reports:/app/reports
    - ../strategies:/app/strategies:ro
    - ../longbridge_tokens:/home/dsa/.longbridge
  depends_on:
    db:
      condition: service_healthy
  networks:
    - argus
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:
  # --- PostgreSQL 数据库服务 ---
  db:
    image: postgres:16-alpine
    container_name: argus-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-argus}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-argus}
      - POSTGRES_DB=${POSTGRES_DB:-argus}
      - TZ=Asia/Shanghai
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-argus} -d ${POSTGRES_DB:-argus}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - argus
    # 默认不对外暴露端口（仅容器网络内可达）；如需外部连接再放开：
    # ports:
    #   - "5432:5432"

  # --- 后端 FastAPI（仅 API，静态由 Nginx 托管）---
  backend:
    <<: *backend-common
    container_name: argus-backend
    command: ["python", "main.py", "--serve-only", "--host", "0.0.0.0", "--port", "8000"]
    expose:
      - "8000"

  # --- 前端 Nginx 网关（托管 SPA + 反代 /api）---
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    container_name: argus-web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${WEB_PORT:-80}:80"
    networks:
      - argus
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # --- 可选：定时分析任务（与 backend 同镜像，共享同一 PostgreSQL）---
  # 默认随栈启动；如只需 Web 服务，可用 `--scale analyzer=0` 关闭。
  analyzer:
    <<: *backend-common
    container_name: argus-analyzer
    command: ["python", "main.py", "--schedule"]

volumes:
  pgdata:

networks:
  argus:
    driver: bridge
