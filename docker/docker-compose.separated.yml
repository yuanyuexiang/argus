# ===================================
# 前后端分离 + 独立 PostgreSQL（opt-in 部署方式）
# ===================================
#
# 拓扑（浏览器只与 web 网关同源通信）：
#
#   浏览器 ──同源──▶ web(Nginx :80)
#                       ├── /     → 托管 SPA 静态
#                       └── /api  → backend(FastAPI :8000)
#                                        │ DATABASE_URL
#                                        ▼
#                                   db(postgres:16, 内部网络)
#
# 与单体 docker-compose.yml 互不影响；本文件是独立的分离部署栈。
#
# 使用方式（在仓库根目录执行）：
#   docker compose -f docker/docker-compose.separated.yml up -d --build
# 仅重建前端：
#   docker compose -f docker/docker-compose.separated.yml up -d --build web
#
# 凭据与端口默认值来自仓库根 .env（POSTGRES_USER/PASSWORD/DB、WEB_PORT），
# 生产环境务必修改默认数据库口令。

name: argus-separated

# 后端 / 定时任务共享的公共配置
x-backend-common: &backend-common
  build:
    context: ..
    dockerfile: docker/Dockerfile
    # 默认走国内镜像（本栈面向国内网络环境）；海外/无墙环境可在 .env 置空覆盖：
    #   APT_MIRROR=    PIP_INDEX_URL=https://pypi.org/simple
    args:
      APT_MIRROR: ${APT_MIRROR-mirrors.tuna.tsinghua.edu.cn}
      PIP_INDEX_URL: ${PIP_INDEX_URL-https://pypi.tuna.tsinghua.edu.cn/simple}
  # backend 与 analyzer 代码/依赖相同，仅启动命令（角色）不同。指定同一 image 名，
  # 让 Compose 只构建一次该 Dockerfile、两服务复用同一镜像，避免重复构建（省一半时间与磁盘）。
  image: argus-backend:latest
  restart: unless-stopped
  env_file:
    - ../.env
  environment:
    - TZ=Asia/Shanghai
    - WEBUI_HOST=0.0.0.0
    # 指向同栈内的 PostgreSQL 服务；优先于 .env 中的 DATABASE_PATH
    - DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER:-argus}:${POSTGRES_PASSWORD:-argus}@db:5432/${POSTGRES_DB:-argus}
    # 后端位于 Nginx 之后，信任转发头以正确识别协议/客户端 IP
    - TRUST_X_FORWARDED_FOR=true
  volumes:
    - ../data:/app/data
    - ../logs:/app/logs
    - ../reports:/app/reports
    - ../strategies:/app/strategies:ro
    - ../longbridge_tokens:/home/dsa/.longbridge
  depends_on:
    db:
      condition: service_healthy
  networks:
    - argus
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:
  # --- PostgreSQL 数据库服务 ---
  db:
    image: postgres:16-alpine
    container_name: argus-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-argus}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-argus}
      - POSTGRES_DB=${POSTGRES_DB:-argus}
      - TZ=Asia/Shanghai
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-argus} -d ${POSTGRES_DB:-argus}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - argus
    # 默认不对外暴露端口（仅容器网络内可达）；如需外部连接再放开：
    # ports:
    #   - "5432:5432"

  # --- 后端 FastAPI（仅 API，静态由 Nginx 托管）---
  backend:
    <<: *backend-common
    container_name: argus-backend
    command: ["python", "main.py", "--serve-only", "--host", "0.0.0.0", "--port", "8000"]
    expose:
      - "8000"

  # --- 前端 Nginx 网关（托管 SPA + 反代 /api）---
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    container_name: argus-web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${WEB_PORT:-80}:80"
    networks:
      - argus
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # --- 可选：定时分析任务（与 backend 同镜像，共享同一 PostgreSQL）---
  # 默认随栈启动；如只需 Web 服务，可用 `--scale analyzer=0` 关闭。
  analyzer:
    <<: *backend-common
    container_name: argus-analyzer
    command: ["python", "main.py", "--schedule"]

  # --- SearXNG 元搜索（自建，给后端抓取股票资讯用，仅内部网络）---
  # 启用前先用 sed 注入随机密钥生成运行配置（仓库根 ./searxng 已在 .gitignore；
  # 注意必须 sed 替换占位密钥，单纯 cp 会因占位密钥导致 SearXNG 拒绝启动）：
  #   mkdir -p searxng
  #   sed "s/REPLACE_WITH_RANDOM_SECRET/$(openssl rand -hex 32)/" docker/searxng/settings.yml > searxng/settings.yml
  # 并在 .env 设置： SEARXNG_BASE_URLS=http://searxng:8080  SEARXNG_PUBLIC_INSTANCES_ENABLED=false
  searxng:
    image: searxng/searxng:latest
    container_name: argus-searxng
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
      - SEARXNG_BASE_URL=http://searxng:8080/
      # 本地若走 Clash 等代理才需要（让 SearXNG 能访问 Google/Bing 上游）；按需取消注释：
      # - HTTP_PROXY=http://host.docker.internal:7890
      # - HTTPS_PROXY=http://host.docker.internal:7890
      # - NO_PROXY=localhost,127.0.0.1
    volumes:
      # 挂载到仓库根 ./searxng（gitignore），避免改脏仓库模板 docker/searxng/settings.yml
      - ./searxng:/etc/searxng:rw
    expose:
      - "8080"
    networks:
      - argus
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:

networks:
  argus:
    driver: bridge
