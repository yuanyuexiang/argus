# ===================================
# 前后端分离 - Nginx 统一入口
# ===================================
# 浏览器只与本网关同源通信：
#   /        -> 托管 SPA 静态产物（client-side 路由兜底到 index.html）
#   /api/    -> 反向代理到后端 FastAPI（保留 /api 前缀，后端路由为 /api/v1/...）
# 由于对浏览器仍是同源，Cookie/Session 与 CSRF 行为与单体部署一致，无需改动。

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        image/svg+xml
        font/woff2;

    # 上传体积上限（图片识股等场景）；按需调整
    client_max_body_size 25m;

    server {
        listen 80;
        server_name _;

        root  /usr/share/nginx/html;
        index index.html;

        # 构建产物带内容 hash，可长缓存
        location /assets/ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # API 反向代理：保留完整 URI（含 /api 前缀）转发给后端。
        # 使用 Docker 内置 DNS（127.0.0.11）+ 变量形式 proxy_pass 做「运行期惰性解析」，
        # 这样后端容器重启/暂时不可达时，本网关仍能正常启动并继续托管前端，
        # 后端恢复后请求自动复通——契合前后端独立部署的目标。
        location /api/ {
            resolver 127.0.0.11 ipv6=off valid=10s;
            set $backend_upstream http://backend:8000;
            proxy_pass $backend_upstream$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;

            # SSE / 流式响应（分析进度、问股流式输出）：关闭缓冲并拉长超时
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # SPA 前端路由兜底
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
